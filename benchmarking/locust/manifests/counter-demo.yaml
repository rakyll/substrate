apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-counter-demo
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: locust-counter-demo
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: locust-counter-demo
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
      - name: locust
        image: us-docker.pkg.dev/${PROJECT_ID}/gcr.io/ate-images/locust-test:latest
        imagePullPolicy: Always
        env:
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://opentelemetry-collector.gke-managed-otel.svc.cluster.local:4317

        args:
        - "-m"
        - "locust"
        - "-f"
        - "/app/tests/counter_demo.py"
        - "--headless"
        - "--users"
        - "3"
        - "--spawn-rate"
        - "3"

        ports:
        - name: prometheus
          containerPort: 8000
          protocol: TCP
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
