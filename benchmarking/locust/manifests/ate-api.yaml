apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-test
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: locust-test
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: locust-test
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
      - name: locust
        image: us-docker.pkg.dev/${PROJECT_ID}/gcr.io/ate-images/locust-test:latest
        imagePullPolicy: Always
        args:
        - "-m"
        - "locust"
        - "-f"
        - "/app/tests/ate_api.py"
        - "--headless"
        env:

        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://opentelemetry-collector.gke-managed-otel.svc.cluster.local:4317
        ports:
        - name: prometheus
          containerPort: 8000
          protocol: TCP
        volumeMounts:
        - name: servicedns-ca
          mountPath: /run/servicedns-ca
          readOnly: true
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
      volumes:
      - name: servicedns-ca
        projected:
          sources:
          - clusterTrustBundle:
              signerName: servicedns.podcert.ate.dev/identity
              labelSelector:
                matchLabels:
                  podcert.ate.dev/canarying: live
              path: ca.crt

