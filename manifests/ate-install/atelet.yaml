# 1. Create Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: atelet
  namespace: ate-system
---
# 2. Define Permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: atelet
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "watch", "list"]
---
# 3. Bind Identity to Permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: atelet
subjects:
- kind: ServiceAccount
  name: atelet
  namespace: ate-system
roleRef:
  kind: ClusterRole
  name: atelet
  apiGroup: rbac.authorization.k8s.io
---
# 4. Create DaemonSet
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: atelet
  namespace: ate-system
  labels:
    app: atelet
spec:
  selector:
    matchLabels:
      app: atelet
  template:
    metadata:
      labels:
        app: atelet
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: atelet
      containers:
      - name: atelet
        image: ko://github.com/agent-substrate/substrate/cmd/atelet
        args:
        - --gcp-auth-for-image-pulls=true
        # atelet does no mounts, netlink, device, or namespace operations (those
        # live in the ateom worker pod) — it only reads/writes the
        # /var/lib/ateom-gvisor hostPath as root, so it needs no Linux
        # capabilities. (Unpacking arbitrary actor images can require writing into
        # image-defined read-only dirs; the untar in cmd/atelet/oci.go extracts
        # directories writable then restores the image's modes, and removal makes
        # them writable again first, so root suffices without CAP_DAC_OVERRIDE.)
        # runAsUser is pinned explicitly rather than relying on the base image's
        # default user.
        securityContext:
          runAsUser: 0
          runAsGroup: 0
          capabilities:
            drop:
            - ALL
        env:
        - name: MY_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: k8s.namespace.name=$(POD_NAMESPACE),k8s.pod.name=$(POD_NAME),k8s.pod.uid=$(POD_UID),service.instance.id=$(POD_UID)
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://opentelemetry-collector.gke-managed-otel.svc.cluster.local:4317
        - name: ATE_STORAGE_BACKEND
          value: "gcs"
        ports:
        - name: grpc
          containerPort: 8085
          hostPort: 8085
        - name: prometheus
          containerPort: 9090
          hostPort: 9090
          protocol: TCP
        volumeMounts:
        - name: run-ateom
          mountPath: /var/lib/ateom-gvisor
      volumes:
      - name: run-ateom
        hostPath:
          path: /var/lib/ateom-gvisor
          type: DirectoryOrCreate
