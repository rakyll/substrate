# 1. Create Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: atelet
  namespace: ate-system
---
# 2. Define Permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: atelet-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "watch", "list"]
---
# 3. Bind Identity to Permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: atelet-binding
subjects:
- kind: ServiceAccount
  name: atelet
  namespace: ate-system
roleRef:
  kind: ClusterRole
  name: atelet-role
  apiGroup: rbac.authorization.k8s.io
---
# 4. Create DaemonSet
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: atelet
  namespace: ate-system
  labels:
    app: atelet
spec:
  selector:
    matchLabels:
      app: atelet
  template:
    metadata:
      labels:
        app: atelet
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: atelet
      containers:
      - name: atelet
        image: ko://github.com/agent-substrate/substrate/cmd/atelet
        args:
        - --gcp-auth-for-image-pulls=true
        securityContext:
          privileged: true
        env:
        - name: MY_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://opentelemetry-collector.gke-managed-otel.svc.cluster.local:4317
        - name: ATE_STORAGE_BACKEND
          value: "gcs"
        ports:
        - name: grpc
          containerPort: 8085
          hostPort: 8085
        - name: prometheus
          containerPort: 9090
          hostPort: 9090
          protocol: TCP
        volumeMounts:
        - name: run-ateom
          mountPath: /run/ateom-gvisor
      volumes:
      - name: run-ateom
        hostPath:
          path: /run/ateom-gvisor
          type: DirectoryOrCreate