apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../ate-api-server.yaml
  - ../ate-controller.yaml
  - ./atelet
  - ../atenet-dns.yaml
  - ../atenet-router.yaml
  - ../valkey.yaml
  - ../pod-certificate-controller.yaml
  - rustfs.yaml
  - ./otel-collector.yaml

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ate-api-server-deployment
        namespace: ate-system
      spec:
        template:
          spec:
            containers:
            - name: ate-api-server
              env:
              - name: OTEL_EXPORTER_OTLP_ENDPOINT
                value: http://opentelemetry-collector.otel-system.svc:4317
  - patch: |-
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        name: atelet
        namespace: ate-system
      spec:
        template:
          spec:
            containers:
            - name: atelet
              env:
              - name: OTEL_EXPORTER_OTLP_ENDPOINT
                value: http://opentelemetry-collector.otel-system.svc:4317

