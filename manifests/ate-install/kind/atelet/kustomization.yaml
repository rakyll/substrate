apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../atelet.yaml

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        name: atelet
        namespace: ate-system
      spec:
        template:
          spec:
            containers:
            - name: atelet
              args:
              - --gcp-auth-for-image-pulls=false
              - --localhost-registry-replacement=kind-registry:5000
              env:
              - name: OTEL_EXPORTER_OTLP_ENDPOINT
                value: http://opentelemetry-collector.otel-system.svc:4317
              - name: ATE_STORAGE_BACKEND
                value: s3
              - name: AWS_REGION
                value: us-east-1
              - name: AWS_ENDPOINT_URL
                value: http://rustfs.ate-system.svc:9000
              - name: AWS_S3_USE_PATH_STYLE
                value: "true"
              # TODO: use a secret / identity management
              - name: AWS_ACCESS_KEY_ID
                value: rustfsadmin
              - name: AWS_SECRET_ACCESS_KEY
                value: rustfsadmin
