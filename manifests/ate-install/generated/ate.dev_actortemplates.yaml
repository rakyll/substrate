---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: actortemplates.ate.dev
spec:
  group: ate.dev
  names:
    kind: ActorTemplate
    listKind: ActorTemplateList
    plural: actortemplates
    shortNames:
    - actortemplate
    singular: actortemplate
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of ActorTemplate
            properties:
              containers:
                description: Containers is the workload definition.
                items:
                  description: A single application container that you want to run
                    within a WorkerPool.
                  properties:
                    command:
                      description: Entrypoint array. Not executed within a shell.
                      items:
                        type: string
                      maxItems: 64
                      type: array
                      x-kubernetes-list-type: atomic
                    env:
                      description: Environment variables to set in the worker replicas.
                      items:
                        description: |-
                          EnvVar represents an environment variable supplied to a container in an
                          ActorTemplate. It models only a subset of Kubernetes Pod env behavior:
                          literal values are not expanded with Kubernetes-style $(VAR) references,
                          envFrom is not supported, and valueFrom currently supports only secretKeyRef.
                        properties:
                          name:
                            description: |-
                              Name is the name of the environment variable. May be any printable ASCII
                              character except '='.
                            minLength: 1
                            pattern: ^[ -<>-~]+$
                            type: string
                          value:
                            description: |-
                              Variable value. Mutually exclusive with ValueFrom.
                              Value is the literal value of the environment variable. Unlike in
                              Kubernetes pods, this value is not interpolated, and $(VAR)
                              references are not expanded.
                            minLength: 0
                            type: string
                          valueFrom:
                            description: |-
                              Source for the environment variable's value. Mutually exclusive with
                              Value.
                            maxProperties: 1
                            minProperties: 1
                            properties:
                              secretKeyRef:
                                description: Selects a key of a Secret in the ActorTemplate's
                                  namespace.
                                properties:
                                  key:
                                    description: Key to select within the Secret.
                                    minLength: 1
                                    pattern: ^[-._a-zA-Z0-9]+$
                                    type: string
                                  name:
                                    description: Name of the referent Secret.
                                    maxLength: 253
                                    type: string
                                    x-kubernetes-validations:
                                    - message: Name must be a valid DNS subdomain
                                      rule: '!format.dns1123Subdomain().validate(self).hasValue()'
                                  optional:
                                    description: Specify whether the Secret or its
                                      key must be defined.
                                    type: boolean
                                required:
                                - key
                                - name
                                type: object
                            type: object
                        required:
                        - name
                        type: object
                        x-kubernetes-validations:
                        - message: exactly one of the fields in [value valueFrom]
                            must be set
                          rule: '[has(self.value),has(self.valueFrom)].filter(x,x==true).size()
                            == 1'
                      maxItems: 32
                      type: array
                    image:
                      description: Image to use for the worker replicas.
                      type: string
                      x-kubernetes-validations:
                      - message: All images must be pinned (changing the image invalidates
                          snapshots)
                        rule: self.contains('@')
                    name:
                      description: Name of the container.
                      maxLength: 63
                      type: string
                      x-kubernetes-validations:
                      - message: Name must be a valid DNS label
                        rule: '!format.dns1123Label().validate(self).hasValue()'
                  required:
                  - image
                  - name
                  type: object
                maxItems: 10
                type: array
              pauseImage:
                description: |-
                  PauseImage is the container to use as the root sandbox container.

                  Typically, set it to [1] for on-gcp, and [2] for off-gcp

                    - [1] gcr.io/gke-release/pause@sha256:bcbd57ba5653580ec647b16d8163cdd1112df3609129b01f912a8032e48265da
                    - [2] registry.k8s.io/pause:3.10.2@sha256:f548e0e8e3dc1896ca956272154dde3314e8cc4fde0a57577ee9fa1c63f5baf4
                type: string
                x-kubernetes-validations:
                - message: All images must be pinned (changing the image invalidates
                    snapshots)
                  rule: self.contains('@')
              runsc:
                description: Parameters for fetching the runsc binary to use.
                properties:
                  amd64:
                    description: Configuration for the amd64 binary.
                    properties:
                      sha256Hash:
                        description: |-
                          The SHA256 hash of the binary to download.  Used both to name the
                          downloaded file (for preventing conflicts), and to check the integrity of
                          the downloaded file.
                        pattern: ^[a-z0-9]+$
                        type: string
                      url:
                        description: |
                          A gs:// URL pointing to a runsc binary that can be downloaded (possibly
                          with atelet's credentials).
                        minLength: 1
                        type: string
                    required:
                    - sha256Hash
                    - url
                    type: object
                  arm64:
                    description: Configuration for the arm64 binary.
                    properties:
                      sha256Hash:
                        description: |-
                          The SHA256 hash of the binary to download.  Used both to name the
                          downloaded file (for preventing conflicts), and to check the integrity of
                          the downloaded file.
                        pattern: ^[a-z0-9]+$
                        type: string
                      url:
                        description: |
                          A gs:// URL pointing to a runsc binary that can be downloaded (possibly
                          with atelet's credentials).
                        minLength: 1
                        type: string
                    required:
                    - sha256Hash
                    - url
                    type: object
                  authentication:
                    description: How should atelet authenticate to download the runsc
                      binary?
                    properties:
                      gcp:
                        description: Use GCP application-default credentials.
                        type: object
                    type: object
                type: object
              snapshotsConfig:
                description: Snapshots configuration for the actor.
                properties:
                  location:
                    description: Location to store snapshots in.
                    minLength: 1
                    type: string
                required:
                - location
                type: object
              workerPoolRef:
                description: |
                  Name of the worker pool to use for the actor.
                properties:
                  apiVersion:
                    description: API version of the referent.
                    type: string
                  fieldPath:
                    description: |-
                      If referring to a piece of an object instead of an entire object, this string
                      should contain a valid JSON/Go field access statement, such as desiredState.manifest.containers[2].
                      For example, if the object reference is to a container within a pod, this would take on a value like:
                      "spec.containers{name}" (where "name" refers to the name of the container that triggered
                      the event) or if no container name is specified "spec.containers[2]" (container with
                      index 2 in this pod). This syntax is chosen only to have some well-defined way of
                      referencing a part of an object.
                    type: string
                  kind:
                    description: |-
                      Kind of the referent.
                      More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                    type: string
                  name:
                    description: |-
                      Name of the referent.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                  namespace:
                    description: |-
                      Namespace of the referent.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/
                    type: string
                  resourceVersion:
                    description: |-
                      Specific resourceVersion to which this reference is made, if any.
                      More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
                    type: string
                  uid:
                    description: |-
                      UID of the referent.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#uids
                    type: string
                type: object
                x-kubernetes-map-type: atomic
            required:
            - pauseImage
            - runsc
            - snapshotsConfig
            - workerPoolRef
            type: object
          status:
            description: status is the observed state of ActorTemplate
            properties:
              conditions:
                description: conditions defines the status conditions array
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              goldenActorID:
                type: string
              goldenSnapshot:
                type: string
              phase:
                description: Phase of the actor template.
                type: string
              takeGoldenSnapshotAt:
                format: date-time
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
