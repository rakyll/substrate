kind: Namespace
apiVersion: v1
metadata:
  name: ate-system

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ate-client
  namespace: ate-system
  labels:
    apps: ate-client

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ate-controller
  namespace: ate-system
  labels:
    apps: ate-controller

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ate-controller
subjects:
- kind: ServiceAccount
  name: ate-controller
  namespace: ate-system
roleRef:
  kind: ClusterRole
  name: ate-controller
  apiGroup: rbac.authorization.k8s.io

---

kind: Service
apiVersion: v1
metadata:
  name: ate-controller
  namespace: ate-system
  labels:
    app: ate-controller
spec:
  selector:
    app: ate-controller
  ports:
  - name: metrics
    port: 8080
    targetPort: metrics
    protocol: TCP

---

kind: Deployment
apiVersion: apps/v1
metadata:
  name: ate-controller
  namespace: ate-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ate-controller
  template:
    metadata:
      labels:
        app: ate-controller
    spec:
      serviceAccountName: ate-controller
      containers:
      - name: ate-controller
        image: ko://github.com/agent-substrate/substrate/cmd/atecontroller
        args:
        - --ateapi-ca-file=/run/servicedns-ca/trust-bundle.pem
        ports:
        - name: metrics
          containerPort: 8080
          protocol: TCP
        - name: healthz
          containerPort: 8081
          protocol: TCP
