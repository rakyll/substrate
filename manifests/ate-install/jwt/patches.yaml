apiVersion: apps/v1
kind: Deployment
metadata:
  name: ate-controller
  namespace: ate-system
spec:
  template:
    spec:
      containers:
      - name: ate-controller
        volumeMounts:
        - name: ateapi-token
          mountPath: /run/ateapi-token
          readOnly: true
        - name: servicedns-ca
          mountPath: /run/servicedns-ca
          readOnly: true
      volumes:
      - name: ateapi-token
        projected:
          sources:
          - serviceAccountToken:
              audience: api.ate-system.svc
              expirationSeconds: 3600
              path: token
      - name: servicedns-ca
        projected:
          sources:
          - clusterTrustBundle:
              signerName: servicedns.podcert.ate.dev/identity
              labelSelector:
                matchLabels:
                  podcert.ate.dev/canarying: live
              path: trust-bundle.pem
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atenet-router
  namespace: ate-system
spec:
  template:
    spec:
      containers:
      - name: atenet-router
        volumeMounts:
        - name: ateapi-token
          mountPath: /run/ateapi-token
          readOnly: true
        - name: servicedns-ca
          mountPath: /run/servicedns-ca
          readOnly: true
      volumes:
      - name: ateapi-token
        projected:
          sources:
          - serviceAccountToken:
              audience: api.ate-system.svc
              expirationSeconds: 3600
              path: token
      - name: servicedns-ca
        projected:
          sources:
          - clusterTrustBundle:
              signerName: servicedns.podcert.ate.dev/identity
              labelSelector:
                matchLabels:
                  podcert.ate.dev/canarying: live
              path: trust-bundle.pem
